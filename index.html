    function searchMountain() {
        const input = document.getElementById('mountainName').value.trim();
        const resultList = document.getElementById('result-list');
        
        if (!input) { alert('산 이름을 입력하세요!'); return; }

        const results = mountainData.filter(mt => mt.name.includes(input));

        if (results.length === 0) {
            resultList.innerHTML = `
                <div style="text-align:center; padding: 40px;">
                    <p>죄송합니다. '${input}'에 대한 정보를 찾을 수 없습니다.</p>
                    <small style="color:#999;">(북한산, 설악산, 가야산 등 대표적인 명산을 입력해 보세요!)</small>
                </div>`;
            return;
        }

        let html = '';
        results.forEach(mt => {
            html += `
                <div class="mountain-card">
                    <div class="mt-header">
                        <h2 class="mt-name">⛰️ ${mt.name}</h2>
                        <span class="mt-height">해발 ${mt.height}m</span>
                    </div>
                    <p><strong>위치:</strong> ${mt.loc}</p>
                    <p style="margin-bottom:15px; color:#555;">${mt.detail}</p>
                    <div class="course-box">
                        <span class="course-title">🚩 추천 등산로 및 코스</span>
                        <p class="course-detail">${mt.course}</p>
                    </div>
                    <span class="tag">#한국100대명산 #산림청선정 #등산안내</span>
                </div>
            `;
        });
        resultList.innerHTML = html;
    }

    document.getElementById('mountainName').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchMountain();
    });
</script>
