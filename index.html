<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🌲 명산 등산로 탐색기 (수정본)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 기존 디자인 스타일 유지 */
        :root { --primary-green: #2d5a27; --light-green: #e8f5e9; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f4f7f4; margin: 0; }
        header { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1350'); background-size: cover; padding: 60px 20px; text-align: center; color: white; }
        .search-container { max-width: 600px; margin: -30px auto 40px; background: white; padding: 10px; border-radius: 50px; display: flex; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .search-container input { flex: 1; border: none; padding: 15px 25px; outline: none; border-radius: 50px; }
        .search-container button { background: var(--primary-green); color: white; border: none; padding: 0 30px; border-radius: 50px; cursor: pointer; }
        main { max-width: 1000px; margin: 0 auto; padding: 20px; }
        #result-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .mountain-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid var(--primary-green); padding: 20px; }
        .error-box { background: #ffebee; color: #c62828; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: none; font-size: 0.9rem; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>

<header>
    <h1>🌲 명산 등산로 탐색기</h1>
    <p>산림청 공공데이터 실시간 연동</p>
</header>

<div class="search-container">
    <input type="text" id="mountainName" placeholder="산 이름을 입력하세요 (예: 북한산)">
    <button onclick="searchMountain()">검색</button>
</div>

<main>
    <div id="error-display" class="error-box"></div>
    
    <div id="loading" style="text-align:center; display:none;">데이터 로딩 중...</div>
    <div id="result-list"></div>
</main>

<script>
    async function searchMountain() {
        const mountainName = document.getElementById('mountainName').value;
        const resultList = document.getElementById('result-list');
        const errorDisplay = document.getElementById('error-display');
        const loading = document.getElementById('loading');

        if (!mountainName) { alert('이름을 입력하세요!'); return; }

        // 초기화
        resultList.innerHTML = '';
        errorDisplay.style.display = 'none';
        loading.style.display = 'block';

        // ⚠️ 핵심: 인증키 인코딩 문제 해결을 위해 두 가지 키를 모두 준비하세요.
        // 포털에서 준 '일반 인증키(Encoding)'를 그대로 넣으세요.
        const serviceKey = 'eaa76c146cf0d0ad6adb733c6208d108ea5564be3b9de7c629d7c3279eb7c0d1';
        
        // 검색 기능을 수행하는 '명산등산로 검색' 상세기능 URL 사용
        const url = `https://api.forest.go.kr/openapi/service/cultureInfoService/gdTrailInfoOpenAPI?serviceKey=${serviceKey}&searchWrd=${encodeURIComponent(mountainName)}`;

        try {
            const response = await fetch(url);
            
            if (!response.ok) throw new Error(`서버 응답 오류: ${response.status}`);

            const textData = await response.text();
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(textData, "text/xml");

            // API 에러 메시지 확인 (인증키 문제 등)
            const errMsg = xmlDoc.getElementsByTagName("returnAuthMsg")[0]?.textContent;
            if (errMsg) throw new Error(`API 인증 오류: ${errMsg}`);

            const items = xmlDoc.getElementsByTagName("item");
            loading.style.display = 'none';

            if (items.length === 0) {
                resultList.innerHTML = '<p style="grid-column:1/-1; text-align:center;">결과가 없습니다. 다른 산 이름을 입력해 보세요.</p>';
                return;
            }

            // 결과 화면 표시
            for (let item of items) {
                const title = item.getElementsByTagName("mntnm")[0]?.textContent || "산 이름 없음";
                const address = item.getElementsByTagName("mntiadd")[0]?.textContent || "주소 정보 없음";
                const height = item.getElementsByTagName("mntihght")[0]?.textContent || "0";
                
                const card = document.createElement('div');
                card.className = 'mountain-card';
                card.innerHTML = `
                    <h3>📍 ${title}</h3>
                    <p><strong>위치:</strong> ${address}</p>
                    <p><strong>높이:</strong> ${height}m</p>
                `;
                resultList.appendChild(card);
            }

        } catch (error) {
            loading.style.display = 'none';
            errorDisplay.style.display = 'block';
            errorDisplay.innerHTML = `
                <strong>❌ 오류 발생:</strong> ${error.message}<br>
                <small>해결책: 1. 인증키가 승인된 지 1~2시간이 지났는지 확인하세요. 2. 검색어가 정확한지 확인하세요.</small>
            `;
            console.error(error);
        }
    }
</script>

</body>
</html>
